services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: swing
      POSTGRES_PASSWORD: swing
      POSTGRES_DB: swing_detector
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://swing:swing@db:5432/swing_detector
      SECRET_KEY: dev-secret-key
      VIDEO_STORAGE_PATH: /app/uploads
    depends_on:
      - db
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
