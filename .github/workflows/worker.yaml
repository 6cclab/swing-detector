name: Worker CI/CD

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker.yaml"
  pull_request:
    branches: [main]
    paths:
      - "worker/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/6cclab/swing-detector-worker

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q

  build-and-deploy:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, 6cclab]
    steps:
      - uses: actions/checkout@v4

      - name: Fetch secrets from Infisical
        uses: infisical/secrets-action@v1.0.9
        with:
          method: "oidc"
          domain: "https://infisical.6cclab.dev"
          identity-id: "2eff097e-da38-4233-b537-25bfb634e9a4"
          project-slug: "github-actions-wc-rx"
          env-slug: "dev"
          secret-path: "/deploy"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: worker
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max,compression=zstd,compression-level=3

      - name: Checkout deployment repo
        uses: actions/checkout@v4
        with:
          ref: main
          path: deployment
          repository: 6cclab/swing-detector-deployment
          token: ${{ env.PAT }}

      - name: Install Kustomize
        run: |
          KUSTOMIZE_VERSION=5.6.0
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" -o kustomize.tar.gz
          tar xzf kustomize.tar.gz && sudo mv kustomize /usr/local/bin/

      - name: Update image tag
        working-directory: deployment/envs/dev
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          kustomize edit set image ${{ env.IMAGE }}=${{ env.IMAGE }}:${{ github.sha }}
          cd ../..
          git add -A
          if git diff --cached --quiet; then echo "No changes detected"; exit 0; fi
          git commit -m "deploy worker to ${{ github.sha }}"
          git push origin main

      - name: Sync ArgoCD
        uses: clowdhaus/argo-cd-action/@main
        with:
          version: 3.2.1
          command: app
          options: >-
            sync swing-detector
            --grpc-web
            --server argocd.apps.dev-01.6cclab.dev
            --auth-token ${{ env.ARGO_TOKEN }}
            --retry-limit 3
            --retry-backoff-duration 10s
